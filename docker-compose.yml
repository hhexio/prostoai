services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prostoai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: prostoai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://prostoai:${DB_PASSWORD}@postgres:5432/prostoai
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:3000:3000"
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    restart: always

volumes:
  pgdata:
