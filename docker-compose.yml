services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prostoai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: prostoai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://prostoai:${DB_PASSWORD}@postgres:5432/prostoai
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  pgdata:
